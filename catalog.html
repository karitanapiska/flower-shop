<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Дополнительные товары</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-light bg-light">

    <div class="container">

      <a class="navbar-brand" href="index.html">
        Flower Shop
      </a>

      <div>

        <a
          class="btn btn-outline-success"
          href="index.html">

          Главная
        </a>

    </div>

  <section class="container mt-5">

    <div class="row g-4">

      <div class="col-md-6">

        <div class="card p-3">

          <img
  src="https://oceanballoons.ru/content/photo/thumbs/202004061402151.jpg"

          <p>
            Яркие праздничные композиции для любого события

          </button>

        </div>

      </div>


      <div class="col-md-6">

        <div class="card p-3">

          <img
  src="https://kupislona-store.ru/sites/default/files/styles/800x800/public/myagkie-igrushki-big-salamander.jpg?itok=2diqn4u2"
  class="card-img-top"
  alt="Плюшевая игрушка">

          <h3>Плюшевые игрушки</h3>

          <p>
            Милые подарки, которые дополнят букет
          </p>

          <button class="btn btn-outline-success">

          </button>

      </div>

  <script src="script.js"></script>
